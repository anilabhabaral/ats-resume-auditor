version: '3.8'

services:
  resume-auditor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resume-auditor-app
    ports:
      - "8080:8080"
    environment:
      # This pulls the key from your host environment or .env file and passes it to Quarkus
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: unless-stopped